<text class="title" x="390" y="23" text-anchor="middle">haldir-quickstart</text>
<text class="line line-0 k-prompt code" x="22" y="76" fill="#e8e8e8"><tspan class="sigil-prompt">$ </tspan>pip install haldir</text>
<text class="line line-1 k-output code" x="22" y="96" fill="#aab7bd">Successfully installed haldir-0.3.0</text>
<text class="line line-2 k-blank code" x="22" y="116" fill="#ffffff"></text>
<text class="line line-3 k-prompt code" x="22" y="136" fill="#e8e8e8"><tspan class="sigil-prompt">$ </tspan>export HALDIR_API_KEY=hld_live_...</text>
<text class="line line-4 k-blank code" x="22" y="156" fill="#ffffff"></text>
<text class="line line-5 k-prompt code" x="22" y="176" fill="#e8e8e8"><tspan class="sigil-prompt">$ </tspan>python</text>
<text class="line line-6 k-repl code" x="22" y="196" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>from haldir import Haldir</text>
<text class="line line-7 k-repl code" x="22" y="216" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>h = Haldir()</text>
<text class="line line-8 k-repl code" x="22" y="236" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>s = h.create_session(</text>
<text class="line line-9 k-repl code" x="22" y="256" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>    agent_id="my-agent",</text>
<text class="line line-10 k-repl code" x="22" y="276" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>    scopes=["read", "execute"],</text>
<text class="line line-11 k-repl code" x="22" y="296" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>    spend_limit=5.00)</text>
<text class="line line-12 k-repl code" x="22" y="316" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>s.session_id</text>
<text class="line line-13 k-result code" x="22" y="336" fill="#d4b86a">'ses_abc123def456'</text>
<text class="line line-14 k-blank code" x="22" y="356" fill="#ffffff"></text>
<text class="line line-15 k-comment code" x="22" y="376" fill="#6a6a6a"># Every agent call: check -&gt; act -&gt; log</text>
<text class="line line-16 k-repl code" x="22" y="396" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>h.check_permission(s.session_id, "execute")</text>
<text class="line line-17 k-result code" x="22" y="416" fill="#d4b86a">{'allowed': True, 'remaining_budget': 5.00}</text>
<text class="line line-18 k-blank code" x="22" y="436" fill="#ffffff"></text>
<text class="line line-19 k-repl code" x="22" y="456" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>h.log_action(</text>
<text class="line line-20 k-repl code" x="22" y="476" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>    session_id=s.session_id,</text>
<text class="line line-21 k-repl code" x="22" y="496" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>    tool="stripe", action="charge",</text>
<text class="line line-22 k-repl code" x="22" y="516" fill="#e8e8e8"><tspan class="sigil-repl">&gt;&gt;&gt; </tspan>    cost_usd=0.50)</text>
<text class="line line-23 k-result code" x="22" y="536" fill="#d4b86a">{'entry_id': 'aud_789', 'chain_verified': True}</text>
<text class="line line-24 k-blank code" x="22" y="556" fill="#ffffff"></text>
<text class="line line-25 k-comment code" x="22" y="576" fill="#6a6a6a"># Audit trail is tamper-evident. Spend is capped.</text>
<text class="line line-26 k-comment code" x="22" y="596" fill="#6a6a6a"># Your agent is governed.</text>
<style>@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}@keyframes caret-appear{0%{opacity:0}82.78%{opacity:0}82.88%{opacity:1}98%{opacity:1}100%{opacity:0}}.caret{animation: caret-appear 18.0s infinite,           blink 1s infinite steps(1);}</style>
<rect class="caret" x="222" y="582" width="8" height="16" fill="#e8e8e8"/>
