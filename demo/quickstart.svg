inite;}@keyframes reveal-11 {0% {opacity:0}32.78% {opacity:0}32.88% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-11 {animation: reveal-11 18.0s infinite;}@keyframes reveal-12 {0% {opacity:0}37.78% {opacity:0}37.88% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-12 {animation: reveal-12 18.0s infinite;}@keyframes reveal-13 {0% {opacity:0}40.00% {opacity:0}40.10% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-13 {animation: reveal-13 18.0s infinite;}@keyframes reveal-14 {0% {opacity:0}44.44% {opacity:0}44.54% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-14 {animation: reveal-14 18.0s infinite;}@keyframes reveal-15 {0% {opacity:0}46.67% {opacity:0}46.77% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-15 {animation: reveal-15 18.0s infinite;}@keyframes reveal-16 {0% {opacity:0}51.11% {opacity:0}51.21% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-16 {animation: reveal-16 18.0s infinite;}@keyframes reveal-17 {0% {opacity:0}55.00% {opacity:0}55.10% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-17 {animation: reveal-17 18.0s infinite;}@keyframes reveal-18 {0% {opacity:0}60.00% {opacity:0}60.10% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-18 {animation: reveal-18 18.0s infinite;}@keyframes reveal-19 {0% {opacity:0}62.22% {opacity:0}62.32% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-19 {animation: reveal-19 18.0s infinite;}@keyframes reveal-20 {0% {opacity:0}63.89% {opacity:0}63.99% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-20 {animation: reveal-20 18.0s infinite;}@keyframes reveal-21 {0% {opacity:0}65.56% {opacity:0}65.66% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-21 {animation: reveal-21 18.0s infinite;}@keyframes reveal-22 {0% {opacity:0}67.22% {opacity:0}67.32% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-22 {animation: reveal-22 18.0s infinite;}@keyframes reveal-23 {0% {opacity:0}71.67% {opacity:0}71.77% {opacity:1}98% {opacity:1}100% {opacity:0}}.line-23 {animation: reveal-23 18.0s infinite;}@keyframes reveal-24 {0% {opac