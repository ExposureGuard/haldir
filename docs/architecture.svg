<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" role="img" aria-label="Haldir architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 10 6 L 0 12 z" fill="#7b2ff7"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="450" y="42" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e0ddd5" text-anchor="middle">Haldir — Governance Layer for AI Agents</text>
  <text x="450" y="64" font-family="IBM Plex Mono, monospace" font-size="11" fill="#b8973a" text-anchor="middle" letter-spacing="3">GATE · VAULT · WATCH · PROXY</text>

  <!-- Agent -->
  <rect x="80" y="110" width="190" height="90" rx="8" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="175" y="145" font-family="Inter" font-size="15" font-weight="600" fill="#e0ddd5" text-anchor="middle">AI Agent</text>
  <text x="175" y="170" font-family="IBM Plex Mono" font-size="10" fill="#888" text-anchor="middle">Claude · GPT · Cursor</text>
  <text x="175" y="185" font-family="IBM Plex Mono" font-size="10" fill="#888" text-anchor="middle">LangChain · CrewAI · Vercel AI</text>

  <!-- Arrow agent → proxy -->
  <line x1="275" y1="155" x2="345" y2="155" stroke="#7b2ff7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="148" font-family="IBM Plex Mono" font-size="9" fill="#888" text-anchor="middle">tool call</text>

  <!-- Proxy - policy enforcement -->
  <rect x="350" y="100" width="480" height="110" rx="10" fill="#0d1117" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <text x="590" y="130" font-family="Inter" font-size="16" font-weight="700" fill="#7b2ff7" text-anchor="middle">Haldir Proxy</text>
  <text x="590" y="151" font-family="IBM Plex Mono" font-size="10" fill="#aaa" text-anchor="middle">policy enforcement · scope check · spend cap · audit write</text>

  <!-- Sub-boxes inside proxy for modules -->
  <rect x="370" y="163" width="100" height="36" rx="4" fill="#0a0a0a" stroke="#1e3a5f"/>
  <text x="420" y="180" font-family="Inter" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">Gate</text>
  <text x="420" y="194" font-family="IBM Plex Mono" font-size="8" fill="#666" text-anchor="middle">identity · scopes</text>

  <rect x="486" y="163" width="100" height="36" rx="4" fill="#0a0a0a" stroke="#1e3a5f"/>
  <text x="536" y="180" font-family="Inter" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">Vault</text>
  <text x="536" y="194" font-family="IBM Plex Mono" font-size="8" fill="#666" text-anchor="middle">AES-256-GCM</text>

  <rect x="602" y="163" width="100" height="36" rx="4" fill="#0a0a0a" stroke="#1e3a5f"/>
  <text x="652" y="180" font-family="Inter" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">Watch</text>
  <text x="652" y="194" font-family="IBM Plex Mono" font-size="8" fill="#666" text-anchor="middle">SHA-256 chain</text>

  <rect x="718" y="163" width="100" height="36" rx="4" fill="#0a0a0a" stroke="#1e3a5f"/>
  <text x="768" y="180" font-family="Inter" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">Proxy</text>
  <text x="768" y="194" font-family="IBM Plex Mono" font-size="8" fill="#666" text-anchor="middle">policy rules</text>

  <!-- Arrow proxy → upstream -->
  <line x1="590" y1="215" x2="590" y2="270" stroke="#7b2ff7" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="245" font-family="IBM Plex Mono" font-size="9" fill="#888">if allowed</text>

  <!-- Upstreams -->
  <rect x="430" y="285" width="320" height="80" rx="8" fill="#111" stroke="#222" stroke-width="1.5"/>
  <text x="590" y="315" font-family="Inter" font-size="14" font-weight="600" fill="#e0ddd5" text-anchor="middle">Upstream MCP Servers / APIs</text>
  <text x="590" y="339" font-family="IBM Plex Mono" font-size="10" fill="#888" text-anchor="middle">Stripe · GitHub · internal · any HTTP</text>
  <text x="590" y="353" font-family="IBM Plex Mono" font-size="10" fill="#888" text-anchor="middle">or any MCP tool server</text>

  <!-- Enforcement checkpoints -->
  <text x="80" y="240" font-family="IBM Plex Mono" font-size="10" fill="#b8973a" letter-spacing="2">ENFORCEMENT CHECKPOINTS</text>
  <circle cx="80" cy="265" r="5" fill="#00d4ff"/>
  <text x="94" y="269" font-family="IBM Plex Mono" font-size="10" fill="#aaa">session valid &amp; not revoked</text>
  <circle cx="80" cy="287" r="5" fill="#00d4ff"/>
  <text x="94" y="291" font-family="IBM Plex Mono" font-size="10" fill="#aaa">scope matches the tool</text>
  <circle cx="80" cy="309" r="5" fill="#00d4ff"/>
  <text x="94" y="313" font-family="IBM Plex Mono" font-size="10" fill="#aaa">policy rules pass</text>
  <circle cx="80" cy="331" r="5" fill="#00d4ff"/>
  <text x="94" y="335" font-family="IBM Plex Mono" font-size="10" fill="#aaa">spend within budget</text>
  <circle cx="80" cy="353" r="5" fill="#00d4ff"/>
  <text x="94" y="357" font-family="IBM Plex Mono" font-size="10" fill="#aaa">human approval (if required)</text>

  <!-- Kill switch note -->
  <rect x="60" y="395" width="780" height="78" rx="8" fill="rgba(123,47,247,0.06)" stroke="#7b2ff7" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="80" y="420" font-family="IBM Plex Mono" font-size="10" fill="#b8973a" letter-spacing="2">KILL SWITCH · FROM ANY PROCESS</text>
  <text x="80" y="443" font-family="Inter" font-size="13" fill="#e0ddd5">Any holder of the Haldir API key can revoke any session. The next tool call raises</text>
  <text x="80" y="462" font-family="Inter" font-size="13" fill="#e0ddd5">
    <tspan font-family="IBM Plex Mono" fill="#00d4ff">HaldirPermissionError</tspan> — the agent halts, mid-run, without touching the agent process.
  </text>

  <!-- Footer -->
  <text x="450" y="500" font-family="IBM Plex Mono" font-size="9" fill="#555" text-anchor="middle">MIT licensed  ·  haldir.xyz  ·  github.com/ExposureGuard/haldir</text>
</svg>
