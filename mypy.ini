[mypy]
python_version = 3.10
pretty = True
show_error_codes = True
warn_unused_configs = True

# Scope: type-check the security-critical modules and the public SDK. The
# rest of the codebase (api.py, mcp_server.py, cli.py) is a moving target
# still settling into final shape; we'll expand coverage as it stabilizes.
files = haldir_vault, haldir_watch, haldir_tracing.py, haldir_idempotency.py, haldir_logging.py, haldir_metrics.py, haldir_validation.py, haldir_openapi.py, sdk

# Strict-ish defaults for the files above. Not `--strict` (too noisy on
# missing upstream type stubs); instead each strict check enabled explicitly
# so CI failures point at the specific policy that tripped.
check_untyped_defs = True
disallow_any_unimported = True
disallow_incomplete_defs = True
disallow_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_return_any = True
warn_unreachable = True
warn_unused_ignores = True

# Upstream libraries that don't ship type stubs. Ignoring missing imports
# for these is the standard workaround; it does not affect checking of
# our own code.
[mypy-cryptography.*]
ignore_missing_imports = True

[mypy-httpx]
ignore_missing_imports = True

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-haldir_db]
# haldir_db is imported dynamically at function-call time inside the
# security modules. Don't re-check it through those imports — it lives
# in its own not-yet-fully-typed corner of the codebase and will be
# promoted to strict typing in a dedicated follow-up.
ignore_missing_imports = True
follow_imports = silent
